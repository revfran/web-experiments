name: Test & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Upload page screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-screenshots
          path: test-screenshots/
          retention-days: 14

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post screenshots to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const MARKER = '<!-- pw-screenshots -->';
            const dir = 'test-screenshots';

            if (!fs.existsSync(dir)) {
              console.log('No screenshot directory found, skipping comment');
              return;
            }

            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort();
            if (!files.length) {
              console.log('No screenshots found, skipping comment');
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const token = process.env.GITHUB_TOKEN;

            // Upload each PNG to GitHub's CDN via the issue assets API
            const lines = [MARKER, '## Page Screenshots', ''];
            for (const file of files) {
              const content = fs.readFileSync(path.join(dir, file));
              const formData = new FormData();
              formData.append('data', new Blob([content], { type: 'image/png' }), file);
              const res = await fetch(
                `https://uploads.github.com/repos/${owner}/${repo}/issues/${prNumber}/assets?name=${encodeURIComponent(file)}`,
                {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${token}`,
                    Accept: 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    // Content-Type is intentionally omitted — fetch sets it
                    // automatically with the multipart boundary when using FormData
                  },
                  body: formData,
                }
              );
              if (res.ok) {
                const data = await res.json();
                const label = file.replace(/^\d+-/, '').replace('.png', '');
                lines.push(`**${label}**`, `![${label}](${data.url})`, '');
              } else {
                console.error(`Failed to upload ${file}: ${res.status} ${await res.text()}`);
              }
            }

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            lines.push(`*Captured at ${context.sha.slice(0, 7)} · [Full Playwright report](${runUrl})*`);
            const body = lines.join('\n');

            // Update existing comment if present, otherwise create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/configure-pages@v4

      - name: Fetch news from RSS feeds
        run: node scripts/fetch-news.mjs

      - name: Stage static files
        run: |
          mkdir -p _site
          cp index.html weather.html map.html news.html style.css news-data.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
